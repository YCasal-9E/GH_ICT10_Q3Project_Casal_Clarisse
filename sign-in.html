<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Intramurals 25-26</title>
     <style>
        body { 
            background: #74a795b5; 
            color: #fff; 
            height: 100vh; 
            display: flex; 
            align-items: center;
        }
        .card { 
            background: #fdfdfdc7; 
            border: 1px solid #333; 
            width: 100%; 
            max-width: 400px; 
            margin: auto; 
        }
        input { 
            color: rgb(22, 52, 65) !important;
            background: #73737c79 !important; 
            border: 1px solid #444 !important;  
        }
        .btn-custom { 
            background-color: #205041; 
            color: white;
            border: none; 
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.3s ease;
        }
        .btn-custom:hover { 
            background-color:  #5e8f80; 
            color: white;
        }

        #result { 
            margin-top: 20px; 
            text-align: center; 
            font-size: 0.95rem;
            min-height: 24px;
        }
        .custom-navbar {
             background-color: #205041;
             width: 100%;
            position: fixed; 
            top: 0;
            z-index: 1000;
}

    .custom-navbar .navbar-brand {
        color: white;
}

    .custom-navbar .navbar-brand:hover {
        color: #eaf5f2;
}
    .nav-btn {
        background-color: white;
        color: #5e8f80;
        border-radius: 20px;
        padding: 6px 15px;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s ease;
}

    .nav-btn:hover {
        background-color: #5e8f80;
        color: white;
}

    </style>
</head>
<body>
    <nav class="navbar custom-navbar navbar-expand-lg px-4">
    <a class="navbar-brand fw-bold" href="index.html">Intramurals SY 2025-2026</a>

    <div class="ms-auto">
        <a href="sign-in.html" class="nav-btn">Sign Up</a>
        <a href="teams.html" class="nav-btn">Team Checker</a>
        <a href="players.html" class="nav-btn">Players</a>
    </div>
    </nav>

    <div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4" style="color: #365a4e;">Sign Up</h2>
                    <div id="feedback" class="alert d-none" role="alert"></div>
                    <div class="mb-3">
                        <label for="username" class="form-label" style="color: #365a4e;">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Min 7 characters">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label" style="color: #365a4e;">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Min 10 characters, 1 letter, 1 number">
                    </div>
                   <button id="submit-btn" py-click="verify_account" class="btn btn-custom w-100 py-2 mt-2">
                        Create Account
                    </button>
                    <div id="result"></div>
                </div>
            </div>
        </div>
    </div>
</div>
    <py-script src="main.py"></py-script>
</body>

</html>
