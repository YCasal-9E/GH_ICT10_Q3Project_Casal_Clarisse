
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Intramurals 25-26</title>
        <style>
        body {
            min-height: 100vh;
            background-color: #74a795b5;
        }

        .diva1 {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 60px;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }
                .custom-navbar {
             background-color: #205041;
             width: 100%;
            position: fixed; 
            top: 0;
            z-index: 1000;
}

    .custom-navbar .navbar-brand {
        color: white;
}

    .custom-navbar .navbar-brand:hover {
        color: #eaf5f2;
}
    .nav-btn {
        background-color: white;
        color: #5e8f80;
        border-radius: 20px;
        padding: 6px 15px;
        text-decoration: none;
        font-weight: 500;
        transition: 0.3s ease;
}

    .nav-btn:hover {
        background-color: #5e8f80;
        color: white;
}
.btn-design {
    background-color: #205041;
    color: white;
    border: none;
}

.btn-design:hover {
    background-color: #4a7266;
    color: white;
}
    </style>
</head>

<body>
    <nav class="navbar custom-navbar navbar-expand-lg px-4">
    <a class="navbar-brand fw-bold" href="index.html">Intramurals SY 2025-2026</a>

    <div class="ms-auto">
        <a href="sign-in.html" class="nav-btn">Sign Up</a>
        <a href="teams.html" class="nav-btn">Team Checker</a>
        <a href="players.html" class="nav-btn">Players</a>
    </div>
    </nav>
    <div class="container mt-3 mb-4 d-flex justify-content-center align-items-center min-vh-100">
        <div class="diva1 col-md-6 col-lg-5">

            <h3 class="text-center mb-4">Intramurals Eligibility Checker</h3>
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="registered">
                <label class="form-check-label">
                    Confirm Online Registration
                </label>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="medical">
                <label class="form-check-label">
                    Confirm Medical Clearance
                </label>
            </div>
            <div class="mb-3">
                <label class="form-label">Grade Level</label>
                <select class="form-select" id="grade">
                    <option value="">Select Grade</option>
                    <option value="7">Grade 7</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Section</label>
                <select class="form-select" id="section">
                    <option value="">Select Section</option>
                    <option>Emerald</option>
                    <option>Ruby</option>
                    <option>Sapphire</option>
                    <option>Topaz</option>
                    <option>Jade</option>
                </select>
            </div>
            <button id="check" class="btn btn-design w-100" py-click="check_eligibility">
                Check Eligibility
            </button>
            <div id="result" class="mt-4 text-center fw-semibold"></div>
        </div>
    </div>
    <py-script src="main.py"></py-script>
</body>
